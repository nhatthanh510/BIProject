services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cube_bi}
      POSTGRES_USER: ${POSTGRES_USER:-cube_bi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cube_bi_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cube_bi} -d ${POSTGRES_DB:-cube_bi}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.dev.Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-cube_bi}
      POSTGRES_USER: ${POSTGRES_USER:-cube_bi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cube_bi_dev}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.dev.Dockerfile
    command: yarn dev --host 0.0.0.0 --port 5173
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend

volumes:
  pgdata:
  frontend_node_modules:
