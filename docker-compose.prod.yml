services:
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    command: gunicorn cube_bi.wsgi:application --bind 0.0.0.0:8000 --workers 3
    environment:
      DJANGO_SETTINGS_MODULE: cube_bi.settings.prod
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    volumes: []
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    command: nginx -g "daemon off;"
    volumes: []
    ports:
      - "80:80"
    depends_on:
      - backend
